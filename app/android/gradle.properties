org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin's incremental compiler can't relativize paths across drive letters
# (project on D:, Gradle/pub-cache on C:) -- crashes closing its caches with
# "this and base files have different roots". Disabling incremental
# compilation avoids that path entirely; non-incremental full recompiles are
# slower but correct.
kotlin.incremental=false
# This newDsl flag was added by the Flutter template
android.newDsl=false
# This builtInKotlin flag was added by the Flutter template
android.builtInKotlin=false
